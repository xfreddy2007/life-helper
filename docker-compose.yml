services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifehelper
      POSTGRES_PASSWORD: lifehelper_dev
      POSTGRES_DB: life_helper
    ports:
      - "5432:5432"
    volumes:
      - ./db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifehelper -d life_helper"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
